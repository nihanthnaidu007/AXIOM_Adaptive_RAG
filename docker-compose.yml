services:
  postgres:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: axiom
      POSTGRES_PASSWORD: axiom_secret
      POSTGRES_DB: axiom_rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata: