<path d="M 127 328 L 127 337 L 340 337 L 340 344" fill="none" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="328" x2="340" y2="344" stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<path d="M 553 328 L 553 337 L 340 337 L 340 344" fill="none" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- rerank_chunks -->
<rect x="195" y="346" width="290" height="52" rx="8" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
<text x="340" y="359" text-anchor="middle" dominant-baseline="central" fill="#94a3b8" font-size="14" font-weight="500" font-family="system-ui,sans-serif">rerank_chunks</text>
<text x="340" y="385" text-anchor="middle" dominant-baseline="central" fill="#64748b" font-size="12" font-family="system-ui,sans-serif">ms-marco-MiniLM · top 5</text>

<line x1="340" y1="398" x2="340" y2="414" stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- generate_answer -->
<rect x="195" y="416" width="290" height="52" rx="8" fill="#1e0b5e" stroke="#7c3aed" stroke-width="0.5"/>
<text x="340" y="429" text-anchor="middle" dominant-baseline="central" fill="#c4b8f8" font-size="14" font-weight="500" font-family="system-ui,sans-serif">generate_answer</text>
<text x="340" y="455" text-anchor="middle" dominant-baseline="central" fill="#9d89f0" font-size="12" font-family="system-ui,sans-serif">Claude Sonnet · retry 429/5xx</text>

<line x1="340" y1="468" x2="340" y2="484" stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- evaluate_answer -->
<rect x="195" y="486" width="290" height="52" rx="8" fill="#3d1200" stroke="#d97706" stroke-width="0.5"/>
<text x="340" y="499" text-anchor="middle" dominant-baseline="central" fill="#fde68a" font-size="14" font-weight="500" font-family="system-ui,sans-serif">evaluate_answer</text>
<text x="340" y="525" text-anchor="middle" dominant-baseline="central" fill="#fbbf24" font-size="12" font-family="system-ui,sans-serif">RAGAS · Ollama llama3.2</text>

<!-- evaluate fail arrow to rewrite -->
<line x1="485" y1="512" x2="505" y2="512" stroke="#D85A30" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text x="494" y="506" text-anchor="middle" fill="#D85A30" font-size="11" font-family="system-ui,sans-serif">&lt; 0.75</text>

<!-- rewrite_query -->
<rect x="507" y="486" width="158" height="52" rx="8" fill="#3d1200" stroke="#D85A30" stroke-width="0.5"/>
<text x="586" y="499" text-anchor="middle" dominant-baseline="central" fill="#fca5a5" font-size="14" font-weight="500" font-family="system-ui,sans-serif">rewrite_query</text>
<text x="586" y="525" text-anchor="middle" dominant-baseline="central" fill="#f87171" font-size="12" font-family="system-ui,sans-serif">Claude · max 3x</text>

<!-- correction loop -->
<path d="M 665 512 L 665 236 L 465 236" fill="none" stroke="#D85A30" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="660" y="374" text-anchor="end" fill="#D85A30" font-size="12" font-family="system-ui,sans-serif">retry</text>

<!-- evaluate pass arrow to finalize -->
<line x1="340" y1="538" x2="340" y2="554" stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text x="348" y="549" fill="#16a34a" font-size="11" font-family="system-ui,sans-serif">pass</text>

<!-- finalize_answer -->
<rect x="195" y="556" width="290" height="52" rx="8" fill="#042a14" stroke="#16a34a" stroke-width="0.5"/>
<text x="340" y="569" text-anchor="middle" dominant-baseline="central" fill="#86efac" font-size="14" font-weight="500" font-family="system-ui,sans-serif">finalize_answer</text>
<text x="340" y="595" text-anchor="middle" dominant-baseline="central" fill="#4ade80" font-size="12" font-family="system-ui,sans-serif">gate check · cache write</text>

<line x1="340" y1="608" x2="340" y2="624" stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- output -->
<rect x="220" y="626" width="240" height="42" rx="8" fill="#3d3d3a" stroke="#9e9c94" stroke-width="0.5"/>
<text x="340" y="647" text-anchor="middle" dominant-baseline="central" fill="#d1cfc5" font-size="14" font-weight="500" font-family="system-ui,sans-serif">Answer + confidence band</text>

<!-- Redis cache panel -->
<rect x="8" y="144" width="163" height="52" rx="8" fill="#3d3d3a" stroke="#9e9c94" stroke-width="0.5"/>
<text x="89" y="157" text-anchor="middle" dominant-baseline="central" fill="#d1cfc5" font-size="13" font-weight="500" font-family="system-ui,sans-serif">Redis cache</text>
<text x="89" y="183" text-anchor="middle" dominant-baseline="central" fill="#9ca3af" font-size="11" font-family="system-ui,sans-serif">7-day TTL · cosine</text>
<line x1="171" y1="170" x2="193" y2="170" stroke="#6b7280" stroke-width="0.5" stroke-dasharray="4 3" fill="none"/>

<!-- PostgreSQL panel -->
<rect x="8" y="346" width="163" height="52" rx="8" fill="#3d3d3a" stroke="#9e9c94" stroke-width="0.5"/>
<text x="89" y="359" text-anchor="middle" dominant-baseline="central" fill="#d1cfc5" font-size="13" font-weight="500" font-family="system-ui,sans-serif">PostgreSQL</text>
<text x="89" y="385" text-anchor="middle" dominant-baseline="central" fill="#9ca3af" font-size="11" font-family="system-ui,sans-serif">pgvector · BM25</text>
<line x1="171" y1="372" x2="193" y2="372" stroke="#6b7280" stroke-width="0.5" stroke-dasharray="4 3" fill="none"/>

<!-- LangSmith panel -->
<rect x="500" y="74" width="158" height="52" rx="8" fill="#3d3d3a" stroke="#9e9c94" stroke-width="0.5"/>
<text x="579" y="87" text-anchor="middle" dominant-baseline="central" fill="#d1cfc5" font-size="13" font-weight="500" font-family="system-ui,sans-serif">LangSmith</text>
<text x="579" y="113" text-anchor="middle" dominant-baseline="central" fill="#9ca3af" font-size="11" font-family="system-ui,sans-serif">full trace tree</text>
<line x1="485" y1="100" x2="498" y2="100" stroke="#6b7280" stroke-width="0.5" stroke-dasharray="4 3" fill="none"/>

<!-- caption -->
<text x="340" y="692" text-anchor="middle" fill="#6b7280" font-size="11" font-family="system-ui,sans-serif">Purple = LLM call · Amber = quality gate · Teal = retrieval and output · Coral = correction loop · Dashed = infrastructure</text>
</svg>
