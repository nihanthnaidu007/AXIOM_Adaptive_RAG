<line x1="340" y1="56" x2="340" y2="72" stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- classify_query -->
<rect x="195" y="74" width="290" height="52" rx="8" fill="#1e0b5e" stroke="#7c3aed" stroke-width="0.5"/>
<text x="340" y="87" text-anchor="middle" dominant-baseline="central" fill="#c4b8f8" font-size="14" font-weight="500" font-family="system-ui,sans-serif">classify_query</text>
<text x="340" y="113" text-anchor="middle" dominant-baseline="central" fill="#9d89f0" font-size="12" font-family="system-ui,sans-serif">Claude Sonnet · 4 query types</text>

<line x1="340" y1="126" x2="340" y2="142" stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- check_cache -->
<rect x="195" y="144" width="290" height="52" rx="8" fill="#3d1200" stroke="#d97706" stroke-width="0.5"/>
<text x="340" y="157" text-anchor="middle" dominant-baseline="central" fill="#fde68a" font-size="14" font-weight="500" font-family="system-ui,sans-serif">check_cache</text>
<text x="340" y="183" text-anchor="middle" dominant-baseline="central" fill="#fbbf24" font-size="12" font-family="system-ui,sans-serif">Redis · hit skips pipeline</text>

<line x1="340" y1="196" x2="340" y2="212" stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

