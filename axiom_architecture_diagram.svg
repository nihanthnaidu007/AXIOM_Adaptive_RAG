<rect x="467" y="276" width="173" height="52" rx="8" fill="#042a14" stroke="#16a34a" stroke-width="0.5"/>
<text x="553" y="289" text-anchor="middle" dominant-baseline="central" fill="#86efac" font-size="14" font-weight="500" font-family="system-ui,sans-serif">Hybrid RRF</text>
<text x="553" y="315" text-anchor="middle" dominant-baseline="central" fill="#4ade80" font-size="12" font-family="system-ui,sans-serif">asyncio · RRF k=60</text>

