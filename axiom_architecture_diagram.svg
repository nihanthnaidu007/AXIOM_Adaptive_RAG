    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- background -->
<rect width="680" height="710" fill="#1a1a1f"/>

<!-- entry -->
<rect x="220" y="14" width="240" height="42" rx="8" fill="#3d3d3a" stroke="#9e9c94" stroke-width="0.5"/>
