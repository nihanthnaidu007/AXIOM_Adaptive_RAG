<path d="M 285 258 L 285 267 L 127 267 L 127 274" fill="none" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="258" x2="340" y2="274" stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<path d="M 395 258 L 395 267 L 553 267 L 553 274" fill="none" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- routing labels -->
<text x="185" y="264" text-anchor="middle" fill="#6b7280" font-size="11" font-family="system-ui,sans-serif">FACTUAL</text>
<text x="340" y="264" text-anchor="middle" fill="#6b7280" font-size="11" font-family="system-ui,sans-serif">ABSTRACT</text>
<text x="490" y="264" text-anchor="middle" fill="#6b7280" font-size="11" font-family="system-ui,sans-serif">MULTI_HOP</text>

<!-- BM25 -->
<rect x="40" y="276" width="175" height="52" rx="8" fill="#042a14" stroke="#16a34a" stroke-width="0.5"/>
